<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frontend mentor | product card component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main id="product">
  <picture>
    <source srcset="./img/image-product-desktop.jpg" media="(min-width: 700px)">
    <img src="./img/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
  </picture>
  <div class="product-content">
    <p class="category">PERFUME</p>
    <h1>Gabrielle Essence Eau De Parfum</h1>
    <p>A floral,solar and voluptuous interpertation composed by Olivier Polge,Perfumer-creator for the House of CHANEL.</p>
    <div class="price">
      <p class="descount-price">$149.99</p>
      <p class="original-price"> <del>$169.99</del></p>
    </div>
    <button class="cart">Add To Cart</button>
  </div>
  </main>
  
</body>

</html>
